<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terrain Generator</title>
    <link rel="stylesheet" href="resources/styles.css">
    <script src="scripts/perlin.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Saira:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">  
</head>
<body>
    <main>
        <form id='gen_form' action="">
            <h1>Generation</h1>

            <label for="grid_size">Grid Size</label>
            <input type="range" name="grid_size" id="grid_size" min="20" max="500" step="5" value="75">

            <label for="biome_size">Biome Size</label>
            <input type="range" name="biome_size" id="biome_size" min="10" max="30" step="1" value="25">

            <label for="height_variance">Height Variance</label>
            <input type="range" name="height_variance" id="height_variance" min="1" max="20" step="1" value="9">

            <label for="tree_density">Tree Density</label>
            <input type="range" name="tree_density" id="tree_density" min="0.01" max="1" step="0.01" value="0.45">

            <h1>Biome Borders</h1>

            <label for="peak">Peak</label>
            <input type="range" name="peak" id="peak" min="0.01" max="1" step="0.01" value="0.7">

            <label for="mountains">Mountains</label>
            <input type="range" name="mountains" id="mountains" min="0.01" max="1" step="0.01" value="0.645">

            <label for="plains">Plains</label>
            <input type="range" name="plains" id="plains" min="0.01" max="1" step="0.01" value="0.44">

            <label for="beach">Beach</label>
            <input type="range" name="beach" id="beach" min="0.01" max="1" step="0.01" value="0.4">

            <button type="submit">Generate</button>
        </form>

        <h1 id='generating_label'>Generating...</h1>

        <canvas id="main-canvas" width="4000px" height="4000px">
            Your browser does not support the canvas element.
        </canvas>
    </main>

    <script src='scripts/perlin.js'></script>
    <script type="module" src="scripts/main.js"></script>
    <script type="module" src="scripts/camera_movement.js"></script>
    <script type="module" src="scripts/form.js"></script>
</body>
</html>
